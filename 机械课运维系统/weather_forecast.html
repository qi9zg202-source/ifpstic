<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时天气预报</title>
    <!-- 引入 Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入天气图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.10/css/weather-icons.min.css">
    <style>
        .weather-card {
            background: linear-gradient(to bottom right, #4a90e2, #87ceeb);
            color: white;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .weather-icon {
            font-size: 48px;
            margin: 10px 0;
        }
        .temperature {
            font-size: 36px;
            font-weight: bold;
        }
        .weather-details {
            margin-top: 20px;
        }
        .forecast-card {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center my-4">实时天气预报</h1>

        <!-- 位置选择器 -->
        <div class="row mb-4">
            <div class="col-md-6 mx-auto">
                <div class="input-group">
                    <input type="text" class="form-control" id="cityInput" placeholder="输入城市名称">
                    <button class="btn btn-primary" onclick="getWeather()">查询</button>
                </div>
            </div>
        </div>

        <!-- 当前天气 -->
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="weather-card">
                    <div class="row">
                        <div class="col-md-6">
                            <h2 id="cityName">加载中...</h2>
                            <div class="weather-icon">
                                <i class="wi wi-day-sunny"></i>
                            </div>
                            <div class="temperature" id="currentTemp">--°C</div>
                            <div id="weatherDesc">天气状况</div>
                        </div>
                        <div class="col-md-6">
                            <div class="weather-details">
                                <p><i class="wi wi-humidity"></i> 湿度: <span id="humidity">--%</span></p>
                                <p><i class="wi wi-strong-wind"></i> 风速: <span id="windSpeed">-- m/s</span></p>
                                <p><i class="wi wi-barometer"></i> 气压: <span id="pressure">-- hPa</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 天气预报 -->
        <div class="row" id="forecast">
            <!-- 预报卡片将通过JavaScript动态生成 -->
        </div>
    </div>

    <script>
        // 天气图标映射
        const weatherIcons = {
            'Clear': 'wi-day-sunny',
            'Clouds': 'wi-cloudy',
            'Rain': 'wi-rain',
            'Snow': 'wi-snow',
            'Thunderstorm': 'wi-thunderstorm',
            'Drizzle': 'wi-sprinkle',
            'Mist': 'wi-fog'
        };

        // API配置
        const API_KEY = 'your_api_key_here'; // 需要替换为实际的API密钥
        const API_BASE = 'https://api.openweathermap.org/data/2.5';

        async function getWeather() {
            const city = document.getElementById('cityInput').value || '上海'; // 默认城市
            try {
                // 获取当前天气
                const currentResponse = await fetch(
                    `${API_BASE}/weather?q=${city}&appid=${API_KEY}&units=metric&lang=zh_cn`
                );
                const currentData = await currentResponse.json();
                
                // 更新当前天气显示
                updateCurrentWeather(currentData);

                // 获取天气预报
                const forecastResponse = await fetch(
                    `${API_BASE}/forecast?q=${city}&appid=${API_KEY}&units=metric&lang=zh_cn`
                );
                const forecastData = await forecastResponse.json();
                
                // 更新天气预报显示
                updateForecast(forecastData);
            } catch (error) {
                console.error('获取天气数据失败:', error);
                alert('获取天气数据失败，请稍后重试');
            }
        }

        function updateCurrentWeather(data) {
            document.getElementById('cityName').textContent = data.name;
            document.getElementById('currentTemp').textContent = `${Math.round(data.main.temp)}°C`;
            document.getElementById('weatherDesc').textContent = data.weather[0].description;
            document.getElementById('humidity').textContent = `${data.main.humidity}%`;
            document.getElementById('windSpeed').textContent = `${data.wind.speed} m/s`;
            document.getElementById('pressure').textContent = `${data.main.pressure} hPa`;

            // 更新天气图标
            const iconClass = weatherIcons[data.weather[0].main] || 'wi-day-sunny';
            document.querySelector('.weather-icon i').className = `wi ${iconClass}`;
        }

        function updateForecast(data) {
            const forecastContainer = document.getElementById('forecast');
            forecastContainer.innerHTML = '';

            // 获取未来5天的预报
            const dailyForecasts = data.list.filter(item => item.dt_txt.includes('12:00:00'));

            dailyForecasts.forEach(day => {
                const date = new Date(day.dt * 1000);
                const iconClass = weatherIcons[day.weather[0].main] || 'wi-day-sunny';

                const forecastCard = `
                    <div class="col-md-2">
                        <div class="forecast-card text-center">
                            <div>${date.toLocaleDateString('zh-CN', {weekday: 'short'})}</div>
                            <i class="wi ${iconClass} weather-icon"></i>
                            <div class="temperature">${Math.round(day.main.temp)}°C</div>
                            <div>${day.weather[0].description}</div>
                        </div>
                    </div>
                `;
                forecastContainer.innerHTML += forecastCard;
            });
        }

        // 页面加载时获取默认城市天气
        document.addEventListener('DOMContentLoaded', getWeather);
    </script>
</body>
</html>
