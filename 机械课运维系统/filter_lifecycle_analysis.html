<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAB化学过滤器生命周期分析</title>
    <!-- 引入 Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入 Highcharts -->
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <style>
        .chart-container {
            min-height: 400px;
            margin: 20px 0;
        }
        .area-selector {
            margin: 20px 0;
        }
        .filter-type-selector {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h1 class="text-center my-4">FAB化学过滤器生命周期分析</h1>

        <!-- 区域和过滤器类型选择器 -->
        <div class="row">
            <div class="col-md-6">
                <div class="area-selector">
                    <label for="areaSelect" class="form-label">选择区域:</label>
                    <select class="form-select" id="areaSelect">
                        <option value="all">全部区域</option>
                        <option value="litho">Litho区</option>
                        <option value="cmp">CMP区</option>
                        <option value="wet">Wet区</option>
                    </select>
                </div>
            </div>
            <div class="col-md-6">
                <div class="filter-type-selector">
                    <label for="filterType" class="form-label">过滤器类型:</label>
                    <select class="form-select" id="filterType">
                        <option value="all">全部类型</option>
                        <option value="base">Base</option>
                        <option value="acid">Acid</option>
                        <option value="voc">VOC</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 图表容器 -->
        <div class="row">
            <div class="col-12">
                <div id="lifecycleChart" class="chart-container"></div>
            </div>
        </div>
    </div>

    <script>
        // 添加额定寿命配置
        const ratedLifespan = {
            'base': 120,  // Base过滤器额定寿命120天
            'acid': 90,   // Acid过滤器额定寿命90天
            'voc': 150,   // VOC过滤器额定寿命150天
            'all': 120    // 默认额定寿命
        };

        // 模拟数据生成函数
        function generateMockData(area, filterType) {
            const data = [];
            let currentDate = new Date(2023, 0, 1);
            let days = 0;
            
            // 生成一年的数据
            while (currentDate < new Date(2024, 0, 1)) {
                days++;
                
                // 模拟每90-120天更换一次过滤器
                if (days >= 90 + Math.random() * 30) {
                    data.push({
                        x: currentDate.getTime(),
                        y: days,
                        event: 'replacement'
                    });
                    days = 0;
                } else {
                    data.push({
                        x: currentDate.getTime(),
                        y: days
                    });
                }
                
                currentDate = new Date(currentDate.getTime() + 24 * 60 * 60 * 1000);
            }
            
            return data;
        }

        // 初始化图表
        function initChart() {
            Highcharts.chart('lifecycleChart', {
                chart: {
                    type: 'line',
                    zoomType: 'x'
                },
                title: {
                    text: '化学过滤器生命周期分析'
                },
                xAxis: {
                    type: 'datetime',
                    title: {
                        text: '日期'
                    }
                },
                yAxis: {
                    title: {
                        text: '使用天数'
                    },
                    min: 0,
                    plotLines: [{
                        color: '#FF0000',
                        width: 2,
                        value: ratedLifespan['base'],
                        dashStyle: 'shortdash',
                        label: {
                            text: '额定寿命线',
                            align: 'right',
                            style: {
                                color: '#FF0000'
                            }
                        }
                    }]
                },
                tooltip: {
                    formatter: function() {
                        const ratedLife = ratedLifespan[document.getElementById('filterType').value];
                        return `<b>日期:</b> ${Highcharts.dateFormat('%Y-%m-%d', this.x)}<br/>
                                <b>使用天数:</b> ${this.y}天<br/>
                                <b>额定寿命:</b> ${ratedLife}天<br/>
                                ${this.point.event ? '<b>事件:</b> 更换过滤器' : ''}`;
                    }
                },
                series: [{
                    name: 'Litho区 - Base过滤器',
                    data: generateMockData('litho', 'base'),
                    color: '#7cb5ec',
                    marker: {
                        enabled: false
                    }
                }],
                plotOptions: {
                    line: {
                        connectNulls: false
                    }
                }
            });
        }

        // 更新图表数据
        function updateChart() {
            const area = document.getElementById('areaSelect').value;
            const filterType = document.getElementById('filterType').value;
            
            // 获取当前选择的过滤器类型的额定寿命
            const ratedLife = ratedLifespan[filterType];
            
            // 这里可以添加实际的数据获取逻辑
            const newData = generateMockData(area, filterType);
            
            const chart = Highcharts.charts[0];
            
            // 更新数据
            chart.series[0].setData(newData);
            
            // 更新标题
            chart.setTitle({ text: `${area}区 - ${filterType}过滤器生命周期分析` });
            
            // 更新额定寿命线
            chart.yAxis[0].update({
                plotLines: [{
                    color: '#FF0000',
                    width: 2,
                    value: ratedLife,
                    dashStyle: 'shortdash',
                    label: {
                        text: `额定寿命 ${ratedLife}天`,
                        align: 'right',
                        style: {
                            color: '#FF0000'
                        }
                    }
                }]
            });
        }

        // 添加事件监听器
        document.getElementById('areaSelect').addEventListener('change', updateChart);
        document.getElementById('filterType').addEventListener('change', updateChart);

        // 初始化图表
        document.addEventListener('DOMContentLoaded', initChart);
    </script>
</body>
</html>
