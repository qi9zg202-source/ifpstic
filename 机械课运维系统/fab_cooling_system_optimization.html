    <script>
        // 模拟数据生成 - 未来72小时
        function generateTimeData() {
            const now = new Date();
            const times = [];
            for (let i = 1; i <= 48; i++) {
                const time = new Date(now.getTime() + i * 60 * 60 * 1000);
                const month = time.getMonth() + 1;
                const day = time.getDate();
                const hour = time.getHours();
                times.push(`${month}/${day} ${hour}:00`);
            }
            return times;
        }
        
        function generateEnergyData() {
            const data = [];
            for (let i = 0; i < 48; i++) {
                // 模拟工厂用电规律：白天高，夜晚低，周期性变化
                const hourOfDay = i % 24;
                const dayPattern = 800 + Math.sin((hourOfDay - 6) * Math.PI / 12) * 300;
                const weekPattern = 1 + Math.sin(i * Math.PI / 84) * 0.1; // 一周的波动
                const base = dayPattern * weekPattern;
                
                const baseline = Math.round(base + (Math.random() - 0.5) * 60);
                const optimized = Math.round(baseline * (0.75 + Math.random() * 0.15)); // AI优化后节能15-25%
                
                data.push({
                    baseline: baseline,
                    optimized: optimized

            }
            return data;

        function generateEERData() {
            const data = [];
            for (let i = 0; i < 48; i++) {
                const baseline = 3.2 + Math.sin(i * Math.PI / 8) * 0.8 + (Math.random() - 0.5) * 0.3;
                const optimized = baseline * (1.1 + Math.random() * 0.15); // AI优化后EER提升10-25%
                data.push({
                    baseline: baseline,
                    optimized: optimized
                });
            }
            return data;
        }
        
        function generateLoadData() {
            return Array.from({length: 48}, (_, i) => {
                // 模拟制冷负荷规律：跟随环境温度和工厂作业变化
                const hourOfDay = i % 24;
                const dayPattern = 300 + Math.sin((hourOfDay - 8) * Math.PI / 12) * 150; // 白天高负荷
                const weekPattern = 1 + Math.sin(i * Math.PI / 56) * 0.1;
                const base = dayPattern * weekPattern;
                
                return Math.round(base + (Math.random() - 0.5) * 40);
            });
        }

        function formatDateTimeLocal(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;

                return;
            }
            
            // 模拟根据时间范围生成数据
            const start = new Date(startTime);
            const end = new Date(endTime);
            const hoursDiff = Math.ceil((end - start) / (1000 * 60 * 60));

                    loadBase = 55;
                    break;
                case 'mid':
                    powerBase = 350;
                    eerBase = 2.9;
                    loadBase = 65;
                    break;
            }
            
            for (let i = 0; i < hoursDiff; i++) {
                const currentTime = new Date(start.getTime() + i * 60 * 60 * 1000);
                // 确保显示的是未来时间
                if (currentTime <= new Date()) {
                    continue;
                }
                newTimeLabels.push(currentTime.getMonth() + 1 + '/' + currentTime.getDate() + ' ' + currentTime.getHours() + ':00');
                
                // 生成对应的数据

                newEnergyData.push({
                    predicted: Math.round(base + (Math.random() - 0.5) * 50),
                    actual: Math.round(base + (Math.random() - 0.5) * 80)
                });
                
                newEERData.push(eerBase + Math.sin(i * Math.PI / 8) * 0.6 + (Math.random() - 0.5) * 0.3);
                newLoadData.push(loadBase + Math.sin(i * Math.PI / 6) * 20 + (Math.random() - 0.5) * 10);

        // 生成历史寻优策略包数据
        function generateStrategyData() {
            const strategies = [];
            const currentTime = new Date();
            
            for (let i = 1; i <= 12; i++) {
                const deployTime = new Date(currentTime.getTime() - (i * 6 + Math.random() * 24) * 60 * 60 * 1000);
                const isDeployed = Math.random() > 0.3; // 70%概率已下发
                const paramCount = Math.floor(Math.random() * 8) + 3; // 3-10个参数
                const efficiency = (Math.random() * 15 + 5).toFixed(1); // 5-20%效率提升
                
                // 格式化时间为 YYYY/MM/DD/HH:mm
                const timeStr = deployTime.getFullYear() + '/' + 
                              String(deployTime.getMonth() + 1).padStart(2, '0') + '/' + 
                              String(deployTime.getDate()).padStart(2, '0') + '/' + 
                              String(deployTime.getHours()).padStart(2, '0') + ':' + 
                              String(deployTime.getMinutes()).padStart(2, '0');
                
                // 随机选择默认操作状态
                const defaultAction = Math.random() > 0.6 ? '判定-正' : Math.random() > 0.3 ? '判定-负' : '';
                
                strategies.push({
                    id: `OPT-${String(i).padStart(3, '0')}`,
                    deployed: isDeployed,
                    paramCount: paramCount,
                    efficiency: efficiency + '%',
                    deployTime: deployTime,
                    timeStr: timeStr,
                    action: defaultAction
                });
            }
            
            // 按时间倒序排列
            return strategies.sort((a, b) => b.deployTime - a.deployTime);
        }

            // 保存判定结果
            judgmentResults[currentStrategyId] = {
                type: currentJudgmentType,
                content: judgmentContent,
                timestamp: timeStamp,
                fullText: finalJudgment
            };
            
            console.log(`策略包 ${currentStrategyId} 判定结果:`, finalJudgment);
            
            alert(`策略包 ${currentStrategyId} 判定完成！`);
            
            // 关闭弹窗
            closeJudgmentModal();
            
            // 重新渲染表格以更新状态
            renderStrategyTable();
        }

        // 处理文件上传
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const uploadTime = getCurrentTimeDisplay();
            const fileSize = (file.size / 1024).toFixed(2) + ' KB';
            
            const reader = new FileReader();
            reader.onload = function(e) {
                let status = 'success';
                let statusText = '成功';
                
                try {
                    const configData = JSON.parse(e.target.result);
                    console.log('上传的配置文件:', configData);
                    
                    // 记录上传历史
                    const historyItem = {
                        id: Date.now(),
                        fileName: file.name,
                        fileSize: fileSize,
                        uploadTime: uploadTime,
                        status: status,
                        statusText: statusText,
                        data: configData
                    };
                    
                    uploadHistory.unshift(historyItem); // 添加到数组开头
                    
                    // 这里可以添加配置文件解析和应用逻辑
                    alert('配置文件上传成功！\n文件名: ' + file.name + '\n大小: ' + fileSize);
                    
                    // 可以在这里添加配置文件验证和应用逻辑
                    applyConfiguration(configData);
                    
                } catch (error) {
                    console.error('配置文件解析错误:', error);
                    status = 'error';
                    statusText = '失败';
                    
                    // 记录失败的上传历史
                    const historyItem = {
                        id: Date.now(),
                        fileName: file.name,
                        fileSize: fileSize,
                        uploadTime: uploadTime,
                        status: status,
                        statusText: statusText,
                        error: error.message
                    };
                    
                    uploadHistory.unshift(historyItem);
                    
                    alert('配置文件格式错误，请检查文件格式是否正确！');
                }
            };
            
            reader.readAsText(file);
            
            // 清空input，允许重复上传同一文件
            event.target.value = '';
        }

        function renderHistoryList() {
            const historyList = document.getElementById('historyList');
            
            if (uploadHistory.length === 0) {
                historyList.innerHTML = `
                    <div class="history-item" style="text-align: center; color: #666; grid-column: 1 / -1;">
                        暂无上传记录
                    </div>
                `;
                return;
            }
            
            historyList.innerHTML = uploadHistory.map(item => `
                <div class="history-item">
                    <div>${item.uploadTime}</div>
                    <div>${item.fileName}</div>
                    <div>${item.fileSize}</div>
                    <div class="history-action">
                        <button class="history-btn" onclick="downloadHistoryFile(${item.id})">下载</button>
                    </div>
                </div>
            `).join('');
        }
        
        // 下载历史文件
        function downloadHistoryFile(id) {
            const item = uploadHistory.find(h => h.id === id);
            if (!item) {
                alert('找不到该文件记录');
                return;
            }
            
            let fileContent = '';
            let fileName = item.fileName;
            
            // 如果有配置数据，下载JSON格式
            if (item.data) {
                fileContent = JSON.stringify(item.data, null, 2);
                // 确保文件扩展名是.json
                if (!fileName.endsWith('.json')) {
                    fileName = fileName.replace(/\.[^.]*$/, '.json');
                }
            } else {
                // 如果没有数据（失败的上传），创建一个错误信息文件
                fileContent = `文件上传失败记录\n\n文件名: ${item.fileName}\n上传时间: ${item.uploadTime}\n文件大小: ${item.fileSize}\n错误信息: ${item.error || '未知错误'}`;
                fileName = item.fileName.replace(/\.[^.]*$/, '_error_log.txt');
            }
            
            // 创建下载
            const dataBlob = new Blob([fileContent], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            console.log('文件下载完成:', fileName);
        }
