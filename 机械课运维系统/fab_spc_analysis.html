<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAB SPC 分析系统</title>
    <!-- 引入必要的库 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    
    <style>
        /* 主布局样式 */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .main-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            grid-template-rows: 40px 1fr;
            height: 100vh;
        }

        /* 顶部菜单栏样式 */
        .top-menu {
            grid-column: 1 / -1;
            background-color: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            padding: 5px 15px;
            display: flex;
            align-items: center;
        }

        /* 左侧面板样式 */
        .left-panel {
            background-color: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding: 15px;
            overflow-y: auto;
        }

        /* 主要内容区域样式 */
        .content-area {
            padding: 20px;
            overflow-y: auto;
        }

        /* 图表区域样式 */
        .chart-container {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 20px;
        }

        /* 控制面板样式 */
        .control-panel {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
        }

        /* 按钮样式 */
        .spc-btn {
            width: 100%;
            text-align: left;
            margin-bottom: 5px;
            padding: 8px 12px;
            border: none;
            background: #fff;
            border-radius: 4px;
        }

        .spc-btn:hover {
            background-color: #e9ecef;
        }

        /* 表格样式 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .data-table th, .data-table td {
            border: 1px solid #dee2e6;
            padding: 8px;
            text-align: center;
        }

        /* 工具栏样式 */
        .toolbar {
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
        }

        .toolbar button {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- 顶部菜单栏 -->
        <div class="top-menu">
            <div class="btn-group me-2">
                <button class="btn btn-sm btn-outline-secondary">文件</button>
                <button class="btn btn-sm btn-outline-secondary">编辑</button>
                <button class="btn btn-sm btn-outline-secondary">数据</button>
                <button class="btn btn-sm btn-outline-secondary">统计</button>
                <button class="btn btn-sm btn-outline-secondary">图形</button>
                <button class="btn btn-sm btn-outline-secondary">窗口</button>
                <button class="btn btn-sm btn-outline-secondary">帮助</button>
            </div>
        </div>

        <!-- 左侧面板 -->
        <div class="left-panel">
            <div class="control-panel">
                <h6>SPC 分析</h6>
                <button class="spc-btn">控制图</button>
                <button class="spc-btn">能力分析</button>
                <button class="spc-btn">测量系统分析</button>
                <button class="spc-btn">属性协议</button>
                <button class="spc-btn">时间加权图</button>
            </div>
            <div class="control-panel">
                <h6>图表类型</h6>
                <button class="spc-btn">Xbar-R 图</button>
                <button class="spc-btn">Xbar-S 图</button>
                <button class="spc-btn">I-MR 图</button>
                <button class="spc-btn">CUSUM 图</button>
                <button class="spc-btn">EWMA 图</button>
            </div>
        </div>

        <!-- 主要内容区域 -->
        <div class="content-area">
            <!-- 工具栏 -->
            <div class="toolbar">
                <button class="btn btn-sm btn-primary">新建图表</button>
                <button class="btn btn-sm btn-secondary">导入数据</button>
                <button class="btn btn-sm btn-secondary">导出报告</button>
            </div>

            <!-- 图表区域 -->
            <div class="chart-container">
                <div id="spcChart" style="height: 400px;"></div>
            </div>

            <!-- 数据表格 -->
            <div class="chart-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>样本组</th>
                            <th>X1</th>
                            <th>X2</th>
                            <th>X3</th>
                            <th>X4</th>
                            <th>X5</th>
                            <th>平均值</th>
                            <th>范围</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody">
                        <!-- 数据行将通过 JavaScript 动态添加 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 生成示例数据
        function generateSampleData() {
            const data = [];
            for (let i = 1; i <= 25; i++) {
                const row = {
                    group: i,
                    measurements: Array.from({length: 5}, () => 
                        (Math.random() * 2 + 10).toFixed(3)),
                };
                row.average = (row.measurements.reduce((a, b) => 
                    parseFloat(a) + parseFloat(b)) / 5).toFixed(3);
                row.range = (Math.max(...row.measurements) - 
                    Math.min(...row.measurements)).toFixed(3);
                data.push(row);
            }
            return data;
        }

        // 更新数据表格
        function updateDataTable(data) {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.group}</td>
                    ${row.measurements.map(m => `<td>${m}</td>`).join('')}
                    <td>${row.average}</td>
                    <td>${row.range}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 创建 SPC 图表
        function createSPCChart(data) {
            const xbarData = {
                y: data.map(row => parseFloat(row.average)),
                type: 'scatter',
                mode: 'lines+markers',
                name: 'Xbar',
                line: {color: '#1f77b4'}
            };

            const ucl = {
                y: Array(data.length).fill(11.5),
                mode: 'lines',
                name: 'UCL',
                line: {dash: 'dash', color: 'red'}
            };

            const lcl = {
                y: Array(data.length).fill(8.5),
                mode: 'lines',
                name: 'LCL',
                line: {dash: 'dash', color: 'red'}
            };

            const cl = {
                y: Array(data.length).fill(10),
                mode: 'lines',
                name: 'CL',
                line: {dash: 'dot', color: 'green'}
            };

            const layout = {
                title: 'Xbar-R 控制图',
                showlegend: true,
                xaxis: {title: '样本组'},
                yaxis: {title: '测量值'},
                height: 400
            };

            Plotly.newPlot('spcChart', [xbarData, ucl, lcl, cl], layout);
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            const sampleData = generateSampleData();
            updateDataTable(sampleData);
            createSPCChart(sampleData);
        });
    </script>
</body>
</html>
