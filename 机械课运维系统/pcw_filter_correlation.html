<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>PCW滤袋寿命相关性分析</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 引入 Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- 引入 Highcharts -->
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/heatmap.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>

    <style>
        body { 
            background: #f4f6f8; 
            padding: 20px;
        }
        .dashboard-panel {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 32px 24px;
            margin: 20px auto;
            max-width: 1400px;
        }
        .parameter-group {
            margin-bottom: 20px;
        }
        .parameter-group .btn {
            margin: 5px;
            font-size: 14px;
        }
        .info-panel {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .lifecycle-info {
            background: #e3f2fd;
            border-left: 4px solid #1976d2;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
        }
        .chart-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 20px;
            margin-bottom: 20px;
        }
        .scatter-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }
        .scatter-chart {
            height: 300px;
            background: #fff;
            border-radius: 8px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="dashboard-panel">
        <!-- 标题 -->
        <h2 class="mb-4" style="font-weight:600; color:#346187; letter-spacing:1px;">
            PCW滤袋寿命相关性分析
        </h2>

        <!-- 寿命周期信息 -->
        <div class="lifecycle-info">
            <h6><i class="fas fa-info-circle"></i> 滤袋寿命信息</h6>
            <p class="mb-0">标准寿命周期：42天</p>
            <small class="text-muted">分析各影响因子对滤袋实际使用寿命的影响程度</small>
        </div>

        <!-- 信息面板 -->
        <div class="info-panel">
            <div class="row">
                <div class="col-md-6">
                    <h6>分析说明</h6>
                    <p>热力图显示各因子与PCW滤袋寿命（42天）的相关性强度：</p>
                    <ul>
                        <li>红色表示负相关（缩短寿命）</li>
                        <li>蓝色表示正相关（延长寿命）</li>
                        <li>颜色深浅表示影响程度</li>
                    </ul>
                </div>
                <div class="col-md-6">
                    <h6>数据更新时间</h6>
                    <p id="updateTime">最后更新：<span></span></p>
                </div>
            </div>
        </div>

        <!-- 热力图 -->
        <div id="heatmapContainer" style="height: 600px;"></div>

        <!-- 添加散点图网格 -->
        <h3 class="mt-5 mb-4" style="color:#346187;">因子相关性散点图</h3>
        <div class="scatter-grid" id="scatterGrid"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 定义所有参数
            const parameters = [
                // 水质指标
                'NTU', 'T-HARDNESS', 'COPPER', 'IRON', 'PH', '电导率', '菌落', 'CL浓度',
                // 压差相关
                '入口压差', '出口压差', '总压差',
                // 流量相关
                '流量', '频率',
                // 温度相关
                '入口温度', '出口温度',
                // 其他参数
                '浓度'
            ];

            // 生成散点图数据
            function generateScatterData() {
                const points = 50; // 50个数据点
                const data = [];
                for (let i = 0; i < points; i++) {
                    // 生成在合理范围内的随机值
                    // x轴为参数值，y轴为寿命天数（围绕42天波动）
                    data.push([
                        Math.random() * 100, // 参数值
                        42 + (Math.random() - 0.5) * 20 // 寿命天数（32-52天范围内）
                    ]);
                }
                return data;
            }

            // 创建散点图
            function createScatterPlot(container, parameter) {
                return Highcharts.chart(container, {
                    chart: {
                        type: 'scatter',
                        height: 300
                    },
                    title: {
                        text: parameter,
                        style: {
                            fontSize: '14px'
                        }
                    },
                    xAxis: {
                        title: {
                            text: '参数值',
                            style: {
                                fontSize: '12px'
                            }
                        }
                    },
                    yAxis: {
                        title: {
                            text: '寿命(天)',
                            style: {
                                fontSize: '12px'
                            }
                        },
                        plotLines: [{
                            color: '#FF0000',
                            width: 1,
                            value: 42,
                            dashStyle: 'dash',
                            label: {
                                text: '标准寿命(42天)',
                                align: 'right',
                                style: {
                                    fontSize: '10px'
                                }
                            }
                        }]
                    },
                    legend: {
                        enabled: false
                    },
                    plotOptions: {
                        scatter: {
                            marker: {
                                radius: 4,
                                states: {
                                    hover: {
                                        enabled: true,
                                        lineColor: 'rgb(100,100,100)'
                                    }
                                }
                            },
                            states: {
                                hover: {
                                    marker: {
                                        enabled: false
                                    }
                                }
                            }
                        }
                    },
                    tooltip: {
                        formatter: function() {
                            return `<b>${parameter}</b><br/>
                                   参数值: ${this.x.toFixed(2)}<br/>
                                   寿命: ${this.y.toFixed(1)}天`;
                        }
                    },
                    series: [{
                        color: 'rgba(0, 114, 178, 0.5)',
                        data: generateScatterData()
                    }]
                });
            }

            // 生成模拟数据（实际使用时替换为真实数据）
            function generateCorrelationData() {
                const data = [];
                parameters.forEach((param, i) => {
                    // 生成-1到1之间的相关系数
                    const correlation = (Math.random() * 2 - 1).toFixed(2);
                    data.push([i, 0, parseFloat(correlation)]);
                });
                return data;
            }

            // 初始化热力图
            Highcharts.chart('heatmapContainer', {
                chart: {
                    type: 'heatmap',
                    marginTop: 40,
                    marginBottom: 80,
                    plotBorderWidth: 1
                },
                title: {
                    text: 'PCW滤袋寿命(42天)相关性热力图',
                    style: {
                        fontSize: '18px'
                    }
                },
                subtitle: {
                    text: '分析各因子对滤袋标准寿命(42天)的影响程度',
                    style: {
                        color: '#666'
                    }
                },
                xAxis: {
                    categories: parameters,
                    title: {
                        text: '影响因子'
                    },
                    labels: {
                        rotation: -45,
                        style: {
                            fontSize: '12px'
                        }
                    }
                },
                yAxis: {
                    categories: ['滤袋寿命(42天)'],
                    title: {
                        text: '目标变量'
                    }
                },
                colorAxis: {
                    stops: [
                        [0, '#c4463a'],      // 深红色（显著缩短寿命）
                        [0.25, '#ff9999'],   // 浅红色（轻微缩短寿命）
                        [0.5, '#fffbbc'],    // 浅黄色（无明显影响）
                        [0.75, '#99ccff'],   // 浅蓝色（轻微延长寿命）
                        [1, '#3060cf']       // 深蓝色（显著延长寿命）
                    ],
                    min: -1,
                    max: 1,
                    labels: {
                        formatter: function() {
                            if (this.value === -1) return '显著缩短寿命';
                            if (this.value === 0) return '无影响';
                            if (this.value === 1) return '显著延长寿命';
                            return this.value;
                        }
                    }
                },
                legend: {
                    align: 'right',
                    layout: 'vertical',
                    margin: 0,
                    verticalAlign: 'top',
                    y: 25,
                    symbolHeight: 280,
                    title: {
                        text: '相关系数（影响程度）'
                    }
                },
                tooltip: {
                    formatter: function () {
                        const value = this.point.value;
                        let impact = '';
                        if (value < -0.7) impact = '显著缩短寿命';
                        else if (value < -0.3) impact = '轻微缩短寿命';
                        else if (value < 0.3) impact = '影响不明显';
                        else if (value < 0.7) impact = '轻微延长寿命';
                        else impact = '显著延长寿命';
                        
                        return `<b>${this.series.xAxis.categories[this.point.x]}</b> 与 
                               <b>滤袋寿命(42天)</b><br>
                               相关系数: <b>${value}</b><br>
                               影响评估: ${impact}`;
                    }
                },
                series: [{
                    name: '相关系数',
                    borderWidth: 1,
                    data: generateCorrelationData(),
                    dataLabels: {
                        enabled: true,
                        color: '#000000',
                        formatter: function() {
                            return this.point.value.toFixed(2);
                        }
                    }
                }]
            });

            // 创建散点图网格
            const scatterGrid = document.getElementById('scatterGrid');
            parameters.forEach(param => {
                const container = document.createElement('div');
                container.className = 'scatter-chart';
                scatterGrid.appendChild(container);
                createScatterPlot(container, param);
            });

            // 更新时间显示
            document.querySelector('#updateTime span').textContent = 
                new Date().toLocaleString('zh-CN');
        });
    </script>
</body>
</html>
