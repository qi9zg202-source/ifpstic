  <style>
    :root{
      --bg:#f4f6f8;
      --card:#ffffff;
      --accent:#0a6ed1;
      --muted:#64748b;
      --border:#d7e1ed;
      --radius:12px;
      --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    }
    html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font);color:#182230;min-height:100%}
    #app{max-width:960px;margin:40px auto;padding:0 20px 80px;box-sizing:border-box;display:flex;flex-direction:column;gap:18px;position:relative}
    #header-card{background:var(--card);padding:20px 24px;border-radius:var(--radius);box-shadow:0 12px 28px rgba(15,23,42,0.08);display:flex;flex-direction:column;gap:12px;border:1px solid rgba(15,23,42,0.05)}
    #title{font-size:22px;font-weight:600;color:var(--accent)}
    #subtitle{font-size:13px;color:var(--muted)}
    #search-wrapper{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    #search-input{flex:1;min-width:220px;padding:10px 14px;border-radius:10px;border:1px solid var(--border);font-size:14px;background:#f9fbff;transition:border 0.2s ease, box-shadow 0.2s ease}
    #search-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(10,110,209,0.18)}
    #total-count{font-size:12px;color:var(--muted)}
    #time-range{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--muted)}
    #time-range input{padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:12px;color:#20304c}

    #list-card{background:var(--card);border-radius:var(--radius);box-shadow:0 20px 32px rgba(15,23,42,0.12);border:1px solid rgba(15,23,42,0.05)}
    #file-list{list-style:none;margin:0;padding:12px 0;display:flex;flex-direction:column}
    .file-item{display:flex;flex-direction:column;padding:14px 22px;border-bottom:1px solid rgba(215,225,237,0.7);transition:background 0.2s ease, transform 0.2s ease}
    .file-item:last-child{border-bottom:none}
    .file-item:hover{background:#f1f6ff;transform:translateX(4px)}
    .file-link{font-size:15px;font-weight:600;color:#20304c;text-decoration:none;word-break:break-all}
    .file-link:hover{color:var(--accent)}
    .file-meta{font-size:12px;color:var(--muted);margin-top:4px}
    .hidden{display:none!important}

    #about-btn{position:fixed;right:24px;bottom:24px;padding:12px 18px;border-radius:24px;background:var(--accent);color:#fff;font-weight:600;border:none;cursor:pointer;box-shadow:0 14px 32px rgba(10,110,209,0.22);display:flex;align-items:center;gap:6px}
    #about-btn:hover{background:#095eb7}

    #about-dialog{position:fixed;right:24px;bottom:84px;min-width:320px;background:#fff;border-radius:12px;box-shadow:0 18px 36px rgba(15,23,42,0.24);border:1px solid rgba(15,23,42,0.1);padding:18px 20px;display:none;flex-direction:column;gap:12px;z-index:2000}
    #about-dialog.active{display:flex}
    #about-title{font-size:15px;font-weight:600;color:#20304c}
    #about-command{background:#0f172a;color:#e2e8f0;font-family:Menlo,Consolas,monospace;font-size:12px;padding:12px 14px;border-radius:10px;overflow:auto}
    #about-close{align-self:flex-end;background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px}

    .file-meta{display:flex;flex-wrap:wrap;gap:12px;margin-top:6px;font-size:12px;color:var(--muted)}
    .file-meta span{display:flex;align-items:center;gap:4px}

    @media (max-width:640px){
      #app{margin:24px auto}
      #search-wrapper{flex-direction:column;align-items:stretch}
      #search-input{width:100%}
      #time-range{flex-direction:column;align-items:flex-start}
      .file-item{padding:12px 18px}
    }
  </style>
</head>

    <script>
    (function(){
      const files = JSON.parse(document.getElementById('file-data').textContent);
      const listEl = document.getElementById('file-list');
      const searchInput = document.getElementById('search-input');
      const totalCount = document.getElementById('total-count');
      const startDateInput = document.getElementById('start-date');
      const endDateInput = document.getElementById('end-date');

      function createListItem(file){
        const li = document.createElement('li');
        li.className = 'file-item';

        const link = document.createElement('a');
        link.className = 'file-link';
        link.textContent = file.name;
        link.href = encodeURI(file.path);
        link.target = '_blank';
        link.rel = 'noopener';

        const meta = document.createElement('div');
        meta.className = 'file-meta';
        const metaPath = document.createElement('span');
        metaPath.textContent = `路径: ${file.path}`;
        const metaCreated = document.createElement('span');
        metaCreated.textContent = `创建时间: ${file.created || '未知'}`;
        meta.appendChild(metaPath);
        meta.appendChild(metaCreated);

        li.appendChild(link);
        li.appendChild(meta);
        return li;
      }

      function render(){
        listEl.innerHTML = '';
        const keyword = searchInput.value.trim().toLowerCase();
        const startVal = startDateInput.value ? new Date(startDateInput.value + 'T00:00:00').getTime() / 1000 : null;
        const endVal = endDateInput.value ? new Date(endDateInput.value + 'T23:59:59').getTime() / 1000 : null;

        const filtered = files.filter(file=>{
          const matchName = keyword ? file.name.toLowerCase().includes(keyword) : true;
          const matchStart = startVal != null ? file.createdTimestamp >= startVal : true;
          const matchEnd = endVal != null ? file.createdTimestamp <= endVal : true;
          return matchName && matchStart && matchEnd;
        });

        filtered.forEach(file => listEl.appendChild(createListItem(file)));
        totalCount.textContent = `共 ${filtered.length} / ${files.length} 个文件`;
      }

      searchInput.addEventListener('input', () => render());
      startDateInput.addEventListener('change', () => render());
      endDateInput.addEventListener('change', () => render());
      render();

      const aboutBtn = document.getElementById('about-btn');
      const aboutDialog = document.getElementById('about-dialog');
      const aboutClose = document.getElementById('about-close');

      function toggleAbout(show){
        if(show){
          aboutDialog.classList.add('active');
          aboutBtn.setAttribute('aria-expanded','true');
        }else{
          aboutDialog.classList.remove('active');
          aboutBtn.setAttribute('aria-expanded','false');
        }
      }

      aboutBtn.addEventListener('click', ()=>{
        const isOpen = aboutDialog.classList.contains('active');
        toggleAbout(!isOpen);
      });
      aboutClose.addEventListener('click', ()=>toggleAbout(false));
      document.addEventListener('click', (evt)=>{
        if(!aboutDialog.contains(evt.target) && evt.target !== aboutBtn){
          toggleAbout(false);
        }
      });
    })();
  </script>
</body>
</html>
