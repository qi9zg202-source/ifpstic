            // 添加到页面
            document.body.appendChild(overlay);
            document.body.appendChild(menu);
        }

        // 导出Excel功能
        function exportToExcel() {
            if (!selectedNode || !currentLoadData) {
                alert('没有可导出的数据');
                return;
            }
            
            // 创建工作簿
            const wb = XLSX.utils.book_new();
            
            // 准备基础信息
            const exportData = [];
            const currentTime = new Date().toLocaleString('zh-CN');
            
            // 添加表头信息
            exportData.push(['设备负荷统计数据导出']);
            exportData.push(['导出时间:', currentTime]);
            exportData.push(['设备名称:', selectedNode.name]);
            exportData.push(['比较模式:', getModeDisplayName()]);
            exportData.push(['数据时间范围:', getTimeRangeText()]);
            exportData.push([]);
            
            // 准备表格数据
            const headers = ['时间', '实际负荷 (kW)'];
            
            // 根据当前模式添加对比列
            if (currentMode !== 'actual') {
                let compareTitle = '';
                switch(currentMode) {
                    case 'ai':
                        compareTitle = 'AI预测负荷 (kW)';
                        break;
                    case 'yoy':
                        compareTitle = '同比负荷 (kW)';
                        break;
                    case 'mom':
                        compareTitle = '环比负荷 (kW)';
                        break;
                }
                headers.push(compareTitle);
                headers.push('差异率 (%)');
            }
            
            // 添加环境数据列
            headers.push('温度 (℃)');
            headers.push('湿度 (%)');
            
            // 添加表头
            exportData.push(headers);
            
            // 添加数据行
            currentLoadData.forEach(item => {
                const row = [item.time, item.actual];
                
                // 对比数据列（如果不是仅显示实际负荷模式）
                if (currentMode !== 'actual') {
                    let compareValue = 0;
                    switch(currentMode) {
                        case 'ai':
                            compareValue = item.ai;
                            break;
                        case 'yoy':
                            compareValue = item.yoy;
                            break;
                        case 'mom':
                            compareValue = item.mom;
                            break;
                    }
                    
                    row.push(compareValue);
                    
                    // 差异率
                    const differenceRate = Math.round(((item.actual - compareValue) / compareValue) * 10000) / 100;
                    row.push(differenceRate + '%');
                }
                
                // 环境数据
                row.push(item.temperature);
                row.push(item.humidity);
                
                exportData.push(row);
            });
            
            // 添加统计信息
            if (currentLoadData.length > 0) {
                exportData.push([]);
                exportData.push(['统计信息']);
                
                const actualValues = currentLoadData.map(d => d.actual);
                const actualAvg = Math.round((actualValues.reduce((a, b) => a + b, 0) / actualValues.length) * 100) / 100;
                const actualMax = Math.max(...actualValues);
                const actualMin = Math.min(...actualValues);
                
                exportData.push(['实际负荷均值 (kW):', actualAvg]);
                exportData.push(['实际负荷最大值 (kW):', actualMax]);
                exportData.push(['实际负荷最小值 (kW):', actualMin]);
                
                if (currentMode !== 'actual') {
                    let compareValues = [];
                    switch(currentMode) {
                        case 'ai':
                            compareValues = currentLoadData.map(d => d.ai);
                            break;
                        case 'yoy':
                            compareValues = currentLoadData.map(d => d.yoy);
                            break;
                        case 'mom':
                            compareValues = currentLoadData.map(d => d.mom);
                            break;
                    }
                    
                    const compareAvg = Math.round((compareValues.reduce((a, b) => a + b, 0) / compareValues.length) * 100) / 100;
                    const compareMax = Math.max(...compareValues);
                    const compareMin = Math.min(...compareValues);
                    
                    exportData.push([getModeDisplayName() + '均值 (kW):', compareAvg]);
                    exportData.push([getModeDisplayName() + '最大值 (kW):', compareMax]);
                    exportData.push([getModeDisplayName() + '最小值 (kW):', compareMin]);
                }
            }
            
            // 创建工作表
            const ws = XLSX.utils.aoa_to_sheet(exportData);
            
            // 设置列宽
            const colWidths = [
                { wch: 20 }, // 时间
                { wch: 15 }, // 实际负荷
            ];
            
            if (currentMode !== 'actual') {
                colWidths.push({ wch: 15 }); // 对比负荷
                colWidths.push({ wch: 12 }); // 差异率
            }
            
            colWidths.push({ wch: 12 }); // 温度
            colWidths.push({ wch: 12 }); // 湿度
            
            ws['!cols'] = colWidths;
            
            // 添加工作表到工作簿
            XLSX.utils.book_append_sheet(wb, ws, '负荷统计数据');
            
            // 生成文件名
            const fileName = `${selectedNode.name}_负荷统计_${getCurrentDateString().replace(/[\/\s:]/g, '')}.xlsx`;
            
            // 导出文件
            XLSX.writeFile(wb, fileName);
        }
        
        // 获取模式显示名称
        function getModeDisplayName() {
            switch(currentMode) {
                case 'ai':
                    return 'AI预测负荷';
                case 'yoy':
                    return '同比负荷';
                case 'mom':
                    return '环比负荷';
                default:
                    return '实际负荷';
            }
        }
        
        // 获取时间范围文本
        function getTimeRangeText() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            if (startDate && endDate) {
                return `${startDate} 至 ${endDate}`;
            } else {
                return '默认时间范围';
            }
        }

        // 切换显示模式（允许全部取消）
        function toggleMode(mode) {
            const currentToggle = document.getElementById(mode + 'Toggle');
            
            if (currentToggle.checked) {
                // 如果当前按钮被选中，则启用该模式
                // 取消其他开关
                document.getElementById('yoyToggle').checked = false;
                document.getElementById('momToggle').checked = false;
                document.getElementById('aiToggle').checked = false;
                
                // 重新设置当前选中的开关
                currentToggle.checked = true;
                
                // 更新当前模式
                currentMode = mode;
            } else {
                // 如果当前按钮被取消，则进入仅显示实际负荷模式
                currentMode = 'actual';
            }
            
            // 重新渲染图表
            if (selectedNode && currentLoadData) {
                createChart(selectedNode.name, currentLoadData);
            }
        }

        // 切换节点展开/折叠状态
        function toggleNodeExpansion(nodeElement, childrenContainer) {
            const expandIcon = nodeElement.querySelector('.expand-icon');
            const isExpanded = expandIcon.classList.contains('expanded');
            
            if (isExpanded) {
                // 折叠
                expandIcon.classList.remove('expanded');
                expandIcon.classList.add('collapsed');
                childrenContainer.classList.remove('expanded');
                childrenContainer.classList.add('collapsed');
            } else {
                // 展开
                expandIcon.classList.remove('collapsed');
                expandIcon.classList.add('expanded');
                childrenContainer.classList.remove('collapsed');
                childrenContainer.classList.add('expanded');
            }
        }

        // 渲染设备树
        function renderDeviceTree(nodes, container) {
            nodes.forEach(node => {
                const nodeElement = document.createElement('div');
                
                // 如果有子节点，添加展开/折叠功能
                if (node.children && node.children.length > 0) {
                    nodeElement.className = `tree-node level-${node.level} expandable`;
                    
                    // 创建展开/折叠图标
                    const expandIcon = document.createElement('div');
                    expandIcon.className = 'expand-icon expanded'; // 默认展开
                    nodeElement.appendChild(expandIcon);
                    
                    // 添加节点文本
                    const textSpan = document.createElement('span');
                    textSpan.textContent = node.name;
                    nodeElement.appendChild(textSpan);
                    
                    // 创建子节点容器
                    const childrenContainer = document.createElement('div');
                    childrenContainer.className = 'tree-children expanded'; // 默认展开
                    
                    // 展开/折叠图标点击事件
                    expandIcon.addEventListener('click', function(e) {
                        e.stopPropagation(); // 阻止事件冒泡
                        toggleNodeExpansion(nodeElement, childrenContainer);
                    });
                    
                    container.appendChild(nodeElement);
                    container.appendChild(childrenContainer);
                    
                    // 递归渲染子节点
                    renderDeviceTree(node.children, childrenContainer);
                } else {
                    // 叶子节点
                    nodeElement.className = `tree-node level-${node.level}`;
                    nodeElement.textContent = node.name;
                    container.appendChild(nodeElement);
                }
                
                nodeElement.dataset.nodeId = node.id;
                nodeElement.dataset.nodeName = node.name;
                
                // 只为实际设备节点添加点击事件（非根节点）
                if (node.level > 0) {
                    nodeElement.addEventListener('click', function(e) {
                        // 如果点击的是展开图标，不处理选中逻辑
                        if (e.target.classList.contains('expand-icon')) {
                            return;
                        }
                        
                        // 清除其他选中状态
                        document.querySelectorAll('.tree-node').forEach(n => n.classList.remove('active'));
                        // 设置当前选中状态
                        this.classList.add('active');
                        
                        selectedNode = {
                            id: this.dataset.nodeId,
                            name: this.dataset.nodeName
                        };
                        
                        // 显示时间查询控件
                        document.getElementById('chartControls').style.display = 'flex';
                        
                        // 生成数据并创建图表
                        const loadData = generateLoadDataByGranularity(selectedNode.id, currentTimeGranularity);
                        createChart(selectedNode.name, loadData);
                    });
                }
            });
        }

        // 查询负荷数据
        function queryLoadData() {
            if (!selectedNode) {
                alert('请先选择设备节点');
                return;
            }
            
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            if (!startDate || !endDate) {
                alert('请选择开始和结束时间');
                return;
            }
            
            if (new Date(startDate) >= new Date(endDate)) {
                alert('开始时间必须早于结束时间');
                return;
            }
            
            // 重新生成数据并更新图表
            const loadData = generateLoadDataByGranularity(selectedNode.id, currentTimeGranularity);
            createChart(selectedNode.name, loadData);
        }

        // 重置负荷数据查询
        function resetLoadData() {
            const today = new Date();
            const todayStr = today.toISOString().slice(0, 16);
            const endStr = today.toISOString().slice(0, 11) + '23:59';
            
            document.getElementById('startDate').value = todayStr.slice(0, 11) + '00:00';
            document.getElementById('endDate').value = endStr;
            
            if (selectedNode) {
                const loadData = generateLoadData(selectedNode.id);
                createChart(selectedNode.name, loadData);
            }
        }

        // 侧边栏折叠功能
        function initSidebarToggle() {
            const sidebarToggle = document.getElementById('sidebarToggle');
            const deviceTreeSection = document.getElementById('deviceTreeSection');
            const toggleIcon = document.getElementById('toggleIcon');
            let isCollapsed = false;
            
            sidebarToggle.addEventListener('click', function() {
                isCollapsed = !isCollapsed;
                
                if (isCollapsed) {
                    deviceTreeSection.classList.add('collapsed');
                    sidebarToggle.classList.add('collapsed');
                    toggleIcon.innerHTML = '›';
                    sidebarToggle.title = '展开侧边栏';
                } else {
                    deviceTreeSection.classList.remove('collapsed');
                    sidebarToggle.classList.remove('collapsed');
                    toggleIcon.innerHTML = '‹';
                    sidebarToggle.title = '折叠侧边栏';
                }
            });
        }

        // 页面初始化
        window.addEventListener('load', function() {
            const treeContainer = document.getElementById('deviceTree');
            renderDeviceTree(deviceTreeData, treeContainer);
            
            // 初始化侧边栏折叠功能
            initSidebarToggle();
            
            // 初始化时间控件为今天
            resetLoadData();
            
            // 默认选中低温系统节点
            setTimeout(() => {
                const lowTempNode = document.querySelector('[data-node-id="low_temp_system"]');
                if (lowTempNode) {
                    lowTempNode.click();
                }
            }, 100);
        });
