            padding: 0;

        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

        .container {

        .header {

            flex-shrink: 0;
        }

        .header h1 {
            font-size: 1.5em;
            background: linear-gradient(45deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .header-date {
            font-size: 1.1em;
            color: #b0c4de;
            font-weight: 500;
            position: absolute;
            right: 15px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .header-date:hover {
            background: rgba(0, 150, 255, 0.1);
            color: #00d4ff;
        }

        .date-picker {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 5px;
            background: rgba(15, 25, 40, 0.95);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            min-width: 200px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
        }

        .date-picker.show {
            display: block;
        }

        .date-picker-header {
            color: #ffffff;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }

        .date-picker-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .date-picker-btn {
            background: rgba(0, 150, 255, 0.2);
            border: 1px solid rgba(0, 150, 255, 0.5);
            color: #ffffff;
            padding: 5px 8px;
            border-radius: 5px;

            font-size: 12px;
            transition: all 0.3s ease;
        }

        .date-picker-btn:hover {

        }

        .date-picker-current {
            color: #00d4ff;
            font-weight: 600;
            font-size: 14px;
        }

        .month-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .month-item {
            background: rgba(0, 150, 255, 0.1);
            border: 1px solid rgba(0, 150, 255, 0.3);
            color: #ffffff;
            padding: 8px;
            text-align: center;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .month-item:hover {
            background: rgba(0, 150, 255, 0.3);
            color: #00d4ff;
        }

        .month-item.selected {
            background: rgba(0, 255, 136, 0.3);
            border-color: #00ff88;
            color: #00ff88;
        }

        /* 翻板效果样式 */
        .flip-container {
            position: relative;
            display: inline-block;
            perspective: 1000px;
            width: 100%;
            height: 20px;
        }

        .flip-card {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 1.8s;
            transform-style: preserve-3d;
        }

        .flip-card.flipping {
            transform: rotateX(180deg);
        }

        .flip-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(20, 30, 50, 0.8);
            border-radius: 3px;
            color: #40e0d0;
            font-family: 'Courier New', monospace;
            font-weight: 500;
        }

        .flip-face.back {
            transform: rotateX(180deg);
        }

        .actual-value-cell {
            font-family: 'Courier New', monospace;
            font-weight: 500;
            color: #40e0d0;
        }

        .header p {
            font-size: 1.2em;
            color: #b0c4de;
            opacity: 0.9;
        }

        .main-content {
            background: rgba(15, 25, 40, 0.8);
            border-radius: 15px;

        }

        .section-title {

            text-align: center;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .table-container {
            overflow: auto;
            border-radius: 10px;
            background: rgba(20, 30, 50, 0.6);
            border: 1px solid rgba(0, 150, 255, 0.3);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
            flex: 1;
            min-height: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        th {
            background: linear-gradient(135deg, rgba(0, 150, 255, 0.2) 0%, rgba(0, 255, 150, 0.2) 100%);
            color: #ffffff;
            padding: 8px 6px;
            text-align: center;
            font-weight: 600;
            font-size: 0.85em;
            border-bottom: 2px solid rgba(0, 150, 255, 0.5);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 6px 4px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 150, 255, 0.1);
            transition: all 0.3s ease;
            font-size: 0.8em;
        }

        tr:hover {
            background: rgba(0, 150, 255, 0.05);
            transform: scale(1.01);
        }

        tbody tr {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background: rgba(0, 150, 255, 0.1);
            border-left: 3px solid #00d4ff;
        }

        tbody tr.selected {
            background: rgba(0, 150, 255, 0.15);
            border-left: 3px solid #00ff88;
        }

        .model-name {
            font-weight: 600;
            color: #00ff88;
            text-shadow: 0 0 5px rgba(0, 255, 136, 0.3);
        }

        .metric-value {
            font-family: 'Courier New', monospace;
            font-weight: 500;
        }

        .r2-value {
            color: #00d4ff;
        }

        .mape-value {
            color: #ff6b6b;
        }

        .mse-value {
            color: #ffd93d;
        }

        .actual-value {
            color: #40e0d0;
        }

        .predicted-value {
            color: #ff69b4;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-active {
            background: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @keyframes breathe {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .data-growing {
            animation: breathe 2s ease-in-out infinite;
        }

        .gear-icon {
            display: inline-block;
            margin-left: 8px;
            animation: rotate 10s linear infinite;
            color: #00ff88;
        }

        .chart-container {
            margin-top: 10px;
            background: rgba(20, 30, 50, 0.6);
            border-radius: 10px;
            padding: 10px;
            border: 1px solid rgba(0, 150, 255, 0.3);
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .controls {
            margin-bottom: 20px;
            text-align: center;
        }

        .btn {
            background: linear-gradient(45deg, #0096ff, #00ff88);
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin: 0 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 150, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 150, 255, 0.4);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .stat-card {
            background: rgba(20, 30, 50, 0.8);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(0, 150, 255, 0.3);
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 150, 255, 0.2);
        }

        .stat-value {
            font-size: 1.4em;
            font-weight: bold;
            color: #00d4ff;
            display: block;
        }

        .stat-label {
            color: #b0c4de;
            margin-top: 3px;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>STIC-高效制冷机房AI模型运行效果评价</h1>
            <div class="header-date" id="currentDate" onclick="toggleDatePicker(event)"></div>
        </header>

        <div class="main-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-value">12</span>
                    <div class="stat-label">运行模型总数</div>
                </div>
                <div class="stat-card">
                    <span class="stat-value">98.5%</span>
                    <div class="stat-label">平均准确率</div>
                </div>
                <div class="stat-card">
                    <span class="stat-value">72.8T<span class="gear-icon">⚙</span></span>
                    <div class="stat-label">训练数据总量T</div>
                </div>
                <div class="stat-card">
                    <span class="stat-value">1,256</span>
                    <div class="stat-label">模型总迭代次数</div>
                </div>
                <div class="stat-card">
                    <span class="stat-value">8,432</span>
                    <div class="stat-label">手动标定数据量</div>
                </div>
            </div>


            <div class="table-container">
                <table id="modelTable">
                    <thead>
                        <tr>
                            <th>状态</th>
                            <th>模型名称</th>
                            <th>模型版本</th>
                            <th>模型更新时间</th>
                            <th>训练样本数（行数）</th>
                            <th>训练决定系数-R²</th>
                            <th>训练平均绝对百分比误差-MAPE(%)</th>
                            <th>训练均方误差-MSE</th>
                            <th>实际结果</th>
                            <th>预测结果</th>

            </div>

            <div class="chart-container">
                <h3 class="section-title">模型性能对比图表</h3>
                <div id="chartContainer" style="flex: 1; min-height: 200px;"></div>
            </div>
        </div>
    </div>

    <script>
        // AI模型数据
        const modelData = [
            {

                mape: 4.12,

                actualValue: 234.7,

            },
            {
                name: '中温二次泵功率模型',

                updateTime: '2025-01-10 13:20:55',
                sampleCount: 5680,
                r2: 0.919,
                mape: 4.56,

            },
            {

                sampleCount: 4320,
                r2: 0.934,
                mape: 3.78,
                mse: 29.85,
                actualValue: 189.6,
                predictedValue: 192.1
            },
            {
                name: '中温冷却泵功率模型',
                version: 'v1.6.9',
                updateTime: '2025-01-08 15:40:25',
                sampleCount: 4320,
                r2: 0.928,
                mape: 4.23,
                mse: 33.72,
                actualValue: 167.8,
                predictedValue: 164.5
            },
            {
                name: '低温冷却塔功率模型',
                version: 'v2.3.0',
                updateTime: '2025-01-07 09:25:15',
                sampleCount: 3840,
                r2: 0.956,
                mape: 2.89,
                mse: 22.14,
                actualValue: 145.2,
                predictedValue: 147.8
            },
            {
                name: '中温冷却塔功率模型',
                version: 'v2.2.6',
                updateTime: '2025-01-06 12:50:30',
                sampleCount: 3840,
                r2: 0.941,
                mape: 3.67,
                mse: 26.93,
                actualValue: 123.9,
                predictedValue: 121.4
            },
            {
                name: '低温冷机功率模型',
                version: 'v3.1.2',
                updateTime: '2025-01-05 14:35:45',
                sampleCount: 8760,
                r2: 0.973,
                mape: 1.98,
                mse: 156.78,
                actualValue: 2100.4,
                predictedValue: 2095.7
            },
            {
                name: '中温冷机功率模型',
                version: 'v3.0.8',
                updateTime: '2025-01-04 11:20:20',
                sampleCount: 8760,
                r2: 0.968,
                mape: 2.15,
                mse: 178.45,
                actualValue: 1890.6,
                predictedValue: 1897.2
            }
        ];

        // 填充表格数据
        function populateTable() {
            const tbody = document.getElementById('modelTableBody');
            tbody.innerHTML = '';

            modelData.forEach((model, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><span class="status-indicator status-active"></span></td>
                    <td class="model-name">${model.name}</td>
                    <td>${model.version}</td>
                    <td>${model.updateTime}</td>
                    <td>${model.sampleCount.toLocaleString()}</td>
                    <td class="metric-value r2-value">${model.r2.toFixed(3)}</td>
                    <td class="metric-value mape-value">${model.mape.toFixed(2)}</td>
                    <td class="metric-value mse-value">${model.mse.toFixed(2)}</td>
                    <td class="actual-value-cell" id="actual-${index}">
                        <div class="flip-container">
                            <div class="flip-card" id="flip-card-${index}">
                                <div class="flip-face front" id="front-${index}">${model.actualValue.toFixed(1)}</div>
                                <div class="flip-face back" id="back-${index}">${model.actualValue.toFixed(1)}</div>
                            </div>
                        </div>
                    </td>
                    <td class="metric-value predicted-value">${model.predictedValue.toFixed(1)}</td>
                `;
                
                // 添加点击事件
                row.addEventListener('click', () => selectModel(index, row));
                row.dataset.modelIndex = index;
                
                tbody.appendChild(row);
            });
        }

        let selectedModelIndex = -1;
        let chartInstance = null;

        // 选择模型
        function selectModel(index, row) {
            // 如果点击的是已选中的行，取消选中并恢复初始图表
            if (selectedModelIndex === index) {
                row.classList.remove('selected');
                selectedModelIndex = -1;
                createInitialChart();
                return;
            }
            
            // 移除之前选中的样式
            const previousSelected = document.querySelector('tbody tr.selected');
            if (previousSelected) {
                previousSelected.classList.remove('selected');
            }
            
            // 添加选中样式
            row.classList.add('selected');
            selectedModelIndex = index;
            
            // 更新图表
            updateChart(index);
        }

        // 更新图表显示选中模型的详细信息
        function updateChart(modelIndex) {
            const model = modelData[modelIndex];
            
            // 生成模拟的历史数据（最近30天）
            const historicalData = [];
            const actualData = [];
            const predictedData = [];
            
            for (let i = 29; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const dateStr = `${date.getMonth() + 1}/${date.getDate()}`;
                
                // 模拟实际值和预测值的变化
                const baseActual = model.actualValue;
                const basePredicted = model.predictedValue;
                const variation = (Math.random() - 0.5) * 0.2; // ±10%变化
                
                const actualVal = baseActual * (1 + variation);
                const predictedVal = basePredicted * (1 + variation * 0.8); // 预测值变化稍小
                
                historicalData.push(dateStr);
                actualData.push(Number(actualVal.toFixed(1)));
                predictedData.push(Number(predictedVal.toFixed(1)));
            }
            
            // 销毁之前的图表
            if (chartInstance) {
                chartInstance.destroy();
            }
            
            // 创建新图表
            chartInstance = Highcharts.chart('chartContainer', {
                chart: {
                    type: 'line',
                    backgroundColor: 'transparent',
                    style: {
                        fontFamily: 'Segoe UI, Tahoma, Geneva, Verdana, sans-serif'
                    }
                },
                title: {
                    text: `${model.name} - 最近30天预测效果`,
                    style: {
                        color: '#ffffff',
                        fontSize: '16px'
                    }
                },
                xAxis: {
                    categories: historicalData,
                    labels: {
                        rotation: -45,
                        style: {
                            color: '#ffffff',
                            fontSize: '10px'
                        }
                    },
                    gridLineColor: 'rgba(255, 255, 255, 0.1)',
                    tickInterval: 5
                },
                yAxis: {
                    title: {
                        text: '数值',
                        style: {
                            color: '#ffffff'
                        }
                    },
                    labels: {
                        style: {
                            color: '#ffffff'
                        }
                    },
                    gridLineColor: 'rgba(255, 255, 255, 0.1)'
                },
                legend: {
                    itemStyle: {
                        color: '#ffffff'
                    }
                },
                plotOptions: {
                    line: {
                        lineWidth: 2,
                        marker: {
                            radius: 3
                        }
                    }
                },
                series: [{
                    name: '实际值',
                    data: actualData,
                    color: '#40e0d0',
                    marker: {
                        symbol: 'circle'
                    }
                }, {
                    name: '预测值',
                    data: predictedData,
                    color: '#ff69b4',
                    marker: {
                        symbol: 'diamond'
                    }
                }],
                tooltip: {
                    backgroundColor: 'rgba(0, 0, 0, 0.8)',
                    style: {
                        color: '#ffffff'
                    },
                    formatter: function() {
                        return `<b>${this.series.name}</b><br/>日期: ${this.x}<br/>数值: ${this.y}`;
                    }
                }
            });
        }

        // 创建初始图表（所有模型对比）
        function createInitialChart() {
            // 销毁之前的图表
            if (chartInstance) {
                chartInstance.destroy();
            }
            
            chartInstance = Highcharts.chart('chartContainer', {
                chart: {
                    type: 'column',
                    backgroundColor: 'transparent',
                    style: {
                        fontFamily: 'Segoe UI, Tahoma, Geneva, Verdana, sans-serif'
                    }
                },
                title: {
                    text: 'AI模型性能指标对比',
                    style: {
                        color: '#ffffff',
                        fontSize: '18px'
                    }
                },
                xAxis: {
                    categories: modelData.map(model => model.name.replace('模型', '')),
                    labels: {
                        rotation: -45,
                        style: {
                            color: '#ffffff'
                        }
                    },
                    gridLineColor: 'rgba(255, 255, 255, 0.1)'
                },
                yAxis: [{
                    title: {
                        text: 'R² 值',
                        style: {
                            color: '#00d4ff'
                        }
                    },
                    labels: {
                        style: {
                            color: '#ffffff'
                        }
                    },
                    gridLineColor: 'rgba(255, 255, 255, 0.1)',
                    min: 0.9,
                    max: 1.0
                }, {
                    title: {
                        text: 'MAPE (%)',
                        style: {
                            color: '#ff6b6b'
                        }
                    },
                    labels: {
                        style: {
                            color: '#ffffff'
                        }
                    },
                    opposite: true
                }],
                legend: {
                    itemStyle: {
                        color: '#ffffff'
                    }
                },
                plotOptions: {
                    column: {
                        borderWidth: 0,
                        borderRadius: 3
                    }
                },
                series: [{
                    name: 'R² 值',
                    data: modelData.map(model => model.r2),
                    color: '#00d4ff',
                    yAxis: 0
                }, {
                    name: 'MAPE (%)',
                    data: modelData.map(model => model.mape),
                    color: '#ff6b6b',
                    yAxis: 1
                }],
                tooltip: {
                    backgroundColor: 'rgba(0, 0, 0, 0.8)',
                    style: {
                        color: '#ffffff'
                    }
                }
            });
        }

        // 创建图表
        function createChart() {
            createInitialChart();
        }

        // 刷新数据
        function refreshData() {
            // 模拟数据更新
            modelData.forEach(model => {
                model.actualValue += (Math.random() - 0.5) * 10;
                model.predictedValue += (Math.random() - 0.5) * 10;
            });
            populateTable();
            createChart();
        }

        // 导出数据
        function exportData() {
            const csvContent = "data:text/csv;charset=utf-8," 
                + "模型名称,模型版本,更新时间,样本数,R²,MAPE,MSE,实际结果,预测结果\n"
                + modelData.map(model => 
                    `${model.name},${model.version},${model.updateTime},${model.sampleCount},${model.r2},${model.mape},${model.mse},${model.actualValue},${model.predictedValue}`
                ).join("\n");
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "ai_model_evaluation.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 显示图表
        function showCharts() {
            document.querySelector('.chart-container').scrollIntoView({ 
                behavior: 'smooth' 
            });
        }

        let currentDate = new Date();
        let selectedYear = currentDate.getFullYear();
        let selectedMonth = currentDate.getMonth() + 1;

        // 更新日期显示
        function updateDate() {
            const year = selectedYear;
            const month = String(selectedMonth).padStart(2, '0');
            document.getElementById('currentDate').innerHTML = `
                ${year}-${month}
                <div class="date-picker" id="datePicker">
                    <div class="date-picker-header">选择时间</div>
                    <div class="date-picker-controls">
                        <button class="date-picker-btn" onclick="changeYear(-1)">◀</button>
                        <span class="date-picker-current" id="pickerYear">${year}</span>
                        <button class="date-picker-btn" onclick="changeYear(1)">▶</button>
                    </div>
                    <div class="month-grid" id="monthGrid"></div>
                </div>
            `;
            updateMonthGrid();
        }

        // 切换日期选择器显示
        function toggleDatePicker(event) {
            if (event) event.stopPropagation();
            const picker = document.getElementById('datePicker');
            const isVisible = picker.classList.contains('show');
            
            if (isVisible) {
                picker.classList.remove('show');
            } else {
                picker.classList.add('show');
                updatePickerYear();
                updateMonthGrid();
            }
        }

        // 更新年份显示
        function updatePickerYear() {
            document.getElementById('pickerYear').textContent = selectedYear;
        }

        // 更新月份网格
        function updateMonthGrid() {
            const monthGrid = document.getElementById('monthGrid');
            const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', 
                              '7月', '8月', '9月', '10月', '11月', '12月'];
            
            monthGrid.innerHTML = '';
            
            monthNames.forEach((monthName, index) => {
                const monthItem = document.createElement('div');
                monthItem.className = 'month-item';
                monthItem.textContent = monthName;
                
                if (index + 1 === selectedMonth && selectedYear === selectedYear) {
                    monthItem.classList.add('selected');
                }
                
                monthItem.onclick = (event) => {
                    event.stopPropagation();
                    selectMonth(index + 1);
                };
                
                monthGrid.appendChild(monthItem);
            });
        }

        // 改变年份
        function changeYear(delta) {
            selectedYear += delta;
            updatePickerYear();
            updateMonthGrid();
        }

        // 选择月份
        function selectMonth(month) {
            selectedMonth = month;
            updateDate();
            document.getElementById('datePicker').classList.remove('show');
            
            // 这里可以添加数据刷新逻辑
            console.log(`选择了时间: ${selectedYear}-${selectedMonth.toString().padStart(2, '0')}`);
        }

        // 点击其他地方关闭日期选择器
        document.addEventListener('click', function(event) {
            const picker = document.getElementById('datePicker');
            const dateElement = document.getElementById('currentDate');
            
            if (!dateElement.contains(event.target)) {
                picker.classList.remove('show');
            }
        });

        // 翻板更新实际结果值
        function updateActualValue(index, newValue) {
            const flipCard = document.getElementById(`flip-card-${index}`);
            const frontFace = document.getElementById(`front-${index}`);
            const backFace = document.getElementById(`back-${index}`);
            
            // 更新背面的新值
            backFace.textContent = newValue.toFixed(1);
            
            // 开始翻转动画
            flipCard.classList.add('flipping');
            
            // 动画完成后交换前后面内容并重置状态
            setTimeout(() => {
                frontFace.textContent = newValue.toFixed(1);
                flipCard.classList.remove('flipping');
            }, 900); // 1.8s动画的一半时间
        }

        // 每5秒更新实际结果值
        function startActualValueUpdates() {
            setInterval(() => {
                modelData.forEach((model, index) => {
                    // 生成新的实际值（在原值基础上±5%变化）
                    const variation = (Math.random() - 0.5) * 0.1; // ±5%
                    const newValue = model.actualValue * (1 + variation);
                    
                    // 更新数据
                    model.actualValue = newValue;
                    
                    // 执行翻板动画
                    updateActualValue(index, newValue);
                });
                
                // 如果有选中的模型，也需要更新图表
                if (selectedModelIndex !== -1) {
                    updateChart(selectedModelIndex);
                }
            }, 5000); // 5秒间隔
        }

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            updateDate();
            populateTable();
            createChart();
            
            // 启动实际值更新
            startActualValueUpdates();
        });
    </script>
</body>
</html>
