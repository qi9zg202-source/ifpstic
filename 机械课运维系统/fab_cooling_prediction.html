        function createBalloonSVG(event) {

                        <stop offset="100%" style="stop-color:#1a1f2e;stop-opacity:0.9" />
                    </radialGradient>
                    <filter id="balloonShadow_${event.dayIndex}">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                        <feOffset dx="2" dy="4" result="offset"/>
                        <feComponentTransfer>
                            <feFuncA type="linear" slope="0.5"/>
                        </feComponentTransfer>
                        <feMerge> 
                            <feMergeNode/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                    <filter id="balloonGlow_${event.dayIndex}">
                        <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                        <feMerge> 
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                <!-- 热气球主体 -->
                <ellipse cx="16" cy="18" rx="12" ry="16" 
                         fill="url(#balloonGrad_${event.dayIndex})" 
                         stroke="${event.bubbleColor}" 
                         stroke-width="2" 
                         filter="url(#balloonShadow_${event.dayIndex})"
                         opacity="0.95"/>
                <!-- 高光效果 -->
                <ellipse cx="12" cy="12" rx="4" ry="6" fill="white" opacity="0.5"/>
                <ellipse cx="10" cy="10" rx="2" ry="3" fill="white" opacity="0.8"/>
                <!-- 吊篮 -->
                <rect x="13" y="32" width="6" height="4" 
                      fill="#8B4513" 
                      stroke="#654321" 
                      stroke-width="1" 
                      rx="1"/>
                <!-- 连接线 -->
                <line x1="8" y1="28" x2="13" y2="32" stroke="#333" stroke-width="1" opacity="0.7"/>
                <line x1="16" y1="30" x2="16" y2="32" stroke="#333" stroke-width="1" opacity="0.7"/>
                <line x1="24" y1="28" x2="19" y2="32" stroke="#333" stroke-width="1" opacity="0.7"/>
                <!-- 事件标记 -->
                <text x="16" y="22" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="Arial">!</text>

                         stroke-width="1" 
                         filter="url(#balloonGlow_${event.dayIndex})"
                         opacity="0.6"/>
            </svg>`;
            
            return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);

        // 创建气泡数据 - 使用热气球形图标
        const bubbleData = eventsData.map(event => ({

                symbol: 'url(' + createBalloonSVG(event) + ')',

        // 存储当前图表实例
        let chartInstance = null;

        // 初始化未来14日机房运行态势预测图表

            }],
            legend: {
                itemStyle: {

                },
                layout: 'horizontal',

                verticalAlign: 'bottom',

            },
            plotOptions: {

            series: [{

            tooltip: {

                formatter: function() {
                    if (this.series.name === '事件气泡') {
                        const dayIndex = this.point.x;
                        const chart = this.series.chart;
                        
                        // 获取各条曲线在该时间点的数值
                        const eerValue = chart.series[0].data[dayIndex] ? chart.series[0].data[dayIndex].y : 'N/A';
                        const tempValue = chart.series[1].data[dayIndex] ? chart.series[1].data[dayIndex].y : 'N/A';
                        const humidityValue = chart.series[2].data[dayIndex] ? chart.series[2].data[dayIndex].y : 'N/A';
                        const loadValue = chart.series[3].data[dayIndex] ? chart.series[3].data[dayIndex].y : 'N/A';
                        
                        return '<div style="max-width: 400px;">' +
                               '<b>📅 ' + this.x + '</b><br/><br/>' +

                               '<span style="color:#ef4444">● 事件名称:</span> ' + this.point.name + '<br/>' +
                               '<span style="color:#f59e0b">● 事件类型:</span> ' + this.point.type + '<br/>' +
                               '<span style="color:#3b82f6">● 发生时间:</span> ' + this.point.time + '<br/>' +
                               '<span style="color:#10b981">● 建议措施:</span> ' + this.point.action + '<br/><br/>' +

                               '<span style="color:#10b981">● EER:</span> ' + (eerValue !== 'N/A' ? eerValue.toFixed(2) : 'N/A') + '<br/>' +
                               '<span style="color:#f59e0b">● 温度:</span> ' + (tempValue !== 'N/A' ? tempValue.toFixed(1) + '°C' : 'N/A') + '<br/>' +
                               '<span style="color:#3b82f6">● 湿度:</span> ' + (humidityValue !== 'N/A' ? humidityValue + '%RH' : 'N/A') + '<br/>' +
                               '<span style="color:#ef4444">● 负荷:</span> ' + (loadValue !== 'N/A' ? loadValue + 'kW' : 'N/A') + '<br/><br/>' +
                               
                               '<b>📝 详细描述:</b><br/>' +
                               '<span style="font-size:12px; line-height:1.4;">' + this.point.detail + '</span>' +
                               '</div>';
                    } else {
                        let tooltip = '<b>' + this.x + '</b><br/>';
                        if (this.series.name === 'EER曲线') {
                            tooltip += '<span style="color:' + this.series.color + '">' + this.series.name + '</span>: ' + this.y.toFixed(2) + '<br/>';
                        } else if (this.series.name === '温度曲线') {
                            tooltip += '<span style="color:' + this.series.color + '">' + this.series.name + '</span>: ' + this.y.toFixed(1) + '°C<br/>';
                        } else if (this.series.name === '湿度曲线') {
                            tooltip += '<span style="color:' + this.series.color + '">' + this.series.name + '</span>: ' + this.y + '%RH<br/>';
                        } else if (this.series.name === '负荷曲线') {
                            tooltip += '<span style="color:' + this.series.color + '">' + this.series.name + '</span>: ' + this.y + 'kW<br/>';
                        }
                        return tooltip;
                    }
                }
            }
        });

        // 存储当前选中的行索引
        let selectedRowIndex = -1;

        // 分页变量
        let currentPage = 1;
        const itemsPerPage = 10;
        const totalPages = Math.ceil(eventsData.length / itemsPerPage);

        // 渲染表格数据
        function renderTable() {
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const currentItems = eventsData.slice(startIndex, endIndex);
            
            const tbody = document.getElementById('eventsTableBody');
            tbody.innerHTML = '';
            
            currentItems.forEach((event, index) => {
                const globalIndex = startIndex + index;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${event.time}</td>
                    <td class="${event.typeClass}">${event.name}</td>
                    <td class="${event.typeClass}">${event.type}</td>
                    <td>${event.detail}</td>
                    <td>${event.action}</td>
                `;
                
                // 添加点击事件
                row.addEventListener('click', function() {
                    // 检查是否点击了已选中的行
                    if (selectedRowIndex === globalIndex) {
                        // 取消选中
                        this.classList.remove('selected');
                        selectedRowIndex = -1;
                        // 清除图表高亮
                        clearChartHighlight();
                    } else {
                        // 移除其他行的选中状态
                        tbody.querySelectorAll('tr').forEach(tr => tr.classList.remove('selected'));
                        // 添加当前行的选中状态
                        this.classList.add('selected');
                        selectedRowIndex = globalIndex;
                        // 显示对应的气泡信息
                        showEventOnChart(globalIndex);
                    }
                });
                
                tbody.appendChild(row);
            });
            
            // 更新分页信息
            document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('totalPages').textContent = totalPages;
            
            // 更新按钮状态
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages;
        }

        // 在图表上显示选中的事件信息
        function showEventOnChart(eventIndex) {
            if (!chartInstance) return;
            
            const event = eventsData[eventIndex];
            const dayIndex = event.dayIndex;
            
            // 获取对应的气泡点
            const bubbleSeries = chartInstance.series.find(s => s.name === '事件气泡');
            if (!bubbleSeries) return;
            
            const bubblePoint = bubbleSeries.data.find(point => point.x === dayIndex);
            if (!bubblePoint) return;
            
            // 显示tooltip
            chartInstance.tooltip.refresh(bubblePoint);
            
            // 高亮显示对应的气泡
            bubbleSeries.data.forEach(point => {
                if (point.x === dayIndex) {
                    point.setState('hover');
                } else {
                    point.setState('');
                }
            });
            
            // 可选：滚动到对应的时间点
            // chartInstance.xAxis[0].setExtremes(Math.max(0, dayIndex - 2), Math.min(13, dayIndex + 2));
        }

        // 清除图表高亮状态
        function clearChartHighlight() {
            if (!chartInstance) return;
            
            // 隐藏tooltip
            chartInstance.tooltip.hide();
            
            // 清除所有气泡的高亮状态
            const bubbleSeries = chartInstance.series.find(s => s.name === '事件气泡');
            if (bubbleSeries) {
                bubbleSeries.data.forEach(point => {
                    point.setState('');
                });
            }
        }

        // 切换页面
        function changePage(direction) {
            const newPage = currentPage + direction;
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                // 清除选中状态（因为切换页面后行索引会变化）
                selectedRowIndex = -1;
                clearChartHighlight();
                renderTable();
            }
        }

        // 查询事件功能
        function queryEvents() {
            const timeRange = document.getElementById('timeRange').value;
            const eventType = document.getElementById('eventType').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            console.log('查询条件:', { timeRange, eventType, startDate, endDate });
            
            // 这里可以添加实际的查询逻辑
            // 例如：根据条件过滤数据，更新图表和表格
            alert(`查询条件:\n时间范围: ${timeRange}天\n事件类型: ${eventType}\n开始时间: ${startDate}\n结束时间: ${endDate}`);
        }

        // 重置查询条件
        function resetQuery() {
            document.getElementById('timeRange').value = '14';
            document.getElementById('eventType').value = 'all';
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
        }

        // 初始化日期控件
        function initializeDates() {
            const today = new Date();
            // 设置结束时间为当前时间
            const endDateTime = today.toISOString().slice(0, 16); // 格式: YYYY-MM-DDTHH:mm
            // 设置开始时间为14天前的相同时间
            const startDateTime = new Date(today.getTime() - 14 * 24 * 60 * 60 * 1000).toISOString().slice(0, 16);
            
            document.getElementById('endDate').value = endDateTime;
            document.getElementById('startDate').value = startDateTime;
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initializeDates();
        });

        // 初始化表格
        renderTable();

    </script>
